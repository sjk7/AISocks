name: CI

on:
  push:
    branches: ["main", "master", "secure"]
  pull_request:
    branches: ["main", "master", "secure"]

# Cancel superseded runs on the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false          # run all matrix legs even if one fails
      matrix:
        include:
          # ---------------------------------------------------------------
          # Linux — GCC
          # ---------------------------------------------------------------
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            cmake_generator: Ninja
            build_type: Debug

          # Linux — Clang
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug

          # ---------------------------------------------------------------
          # macOS — Apple Clang (Xcode toolchain)
          # ---------------------------------------------------------------
          - os: macos-latest
            compiler: apple-clang
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug

          # ---------------------------------------------------------------
          # Windows — MSVC
          # ---------------------------------------------------------------
          - os: windows-latest
            compiler: msvc
            cmake_generator: Ninja
            build_type: Debug

          # Windows — Clang-cl (LLVM toolchain on Windows)
          - os: windows-latest
            compiler: clang-cl
            cmake_generator: Ninja
            build_type: Debug
            env:
              CC: clang-cl
              CXX: clang-cl

          # ---------------------------------------------------------------
          # RelWithDebInfo legs (optimised + debug symbols)
          # ---------------------------------------------------------------
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            cmake_generator: Ninja
            build_type: RelWithDebInfo

          - os: macos-latest
            compiler: apple-clang
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: RelWithDebInfo

          - os: windows-latest
            compiler: msvc
            cmake_generator: Ninja
            build_type: RelWithDebInfo

          # ---------------------------------------------------------------
          # Sanitizer legs — Linux/Clang, Debug
          # ASan and UBSan are incompatible with TSan; keep them separate.
          # ---------------------------------------------------------------

          # ASan + UBSan
          - os: ubuntu-latest
            compiler: clang (asan+ubsan)
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer"
            asan_options: "detect_leaks=1:strict_string_checks=1:detect_stack_use_after_return=1"
            ubsan_options: "print_stacktrace=1:halt_on_error=1"
            ctest_timeout: 120

          # TSan
          - os: ubuntu-latest
            compiler: clang (tsan)
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug
            sanitizer_flags: "-fsanitize=thread -fno-omit-frame-pointer"
            tsan_options: "halt_on_error=1:second_deadlock_stack=1"
            ctest_timeout: 180

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout                                                         #
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Install system dependencies                                      #
      # ------------------------------------------------------------------ #
      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja + LLVM (Windows / clang-cl)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'clang-cl'
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: install ninja llvm -y

      - name: Install Ninja (Windows / MSVC)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'msvc'
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: install ninja -y

      # Set up MSVC compiler environment (cl.exe, link.exe in PATH)
      - name: Set up MSVC environment
        if: matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ------------------------------------------------------------------ #
      # 3. Configure CMake                                                  #
      # ------------------------------------------------------------------ #
      - name: Configure
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          SANITIZER_FLAGS: ${{ matrix.sanitizer_flags }}
        run: |
          CMAKE_ARGS=(
            -S . -B build
            -G "${{ matrix.cmake_generator }}"
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
            -DBUILD_TESTS=ON
            -DBUILD_EXAMPLES=OFF
          )
          if [[ -n "$SANITIZER_FLAGS" ]]; then
            CMAKE_ARGS+=(
              "-DCMAKE_C_FLAGS=$SANITIZER_FLAGS"
              "-DCMAKE_CXX_FLAGS=$SANITIZER_FLAGS"
              "-DCMAKE_EXE_LINKER_FLAGS=$SANITIZER_FLAGS"
            )
          fi
          cmake "${CMAKE_ARGS[@]}"

      # ------------------------------------------------------------------ #
      # 4. Build                                                            #
      # ------------------------------------------------------------------ #
      # We build only the library + tests; the run_all_tests
      # custom target is skipped here—CTest is called explicitly below so
      # that GitHub Actions can parse the results properly.
      - name: Build
        shell: bash
        run: |
          cmake --build build \
            --parallel $(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)

      # ------------------------------------------------------------------ #
      # 5. Test                                                             #
      # ------------------------------------------------------------------ #
      - name: Run tests
        shell: bash
        working-directory: build
        env:
          ASAN_OPTIONS: ${{ matrix.asan_options }}
          UBSAN_OPTIONS: ${{ matrix.ubsan_options }}
          TSAN_OPTIONS: ${{ matrix.tsan_options }}
        run: |
          ctest --output-on-failure \
                --no-compress-output \
                --timeout ${{ matrix.ctest_timeout || 60 }} \
                --parallel 4

      # ------------------------------------------------------------------ #
      # 6. Upload test results on failure                                   #
      # ------------------------------------------------------------------ #
      - name: Upload CTest XML results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-results-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: build/Testing/
          retention-days: 7
