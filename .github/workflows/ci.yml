name: CI

on:
  push:
    branches: ["main", "master", "secure"]
  pull_request:
    branches: ["main", "master", "secure"]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/secure' }}

jobs:
  preflight:
    name: Preflight / Event Diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "sha=${{ github.sha }}"

  build-and-test:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(fromJson('["refs/heads/main","refs/heads/master","refs/heads/secure"]'), github.ref)) ||
      (github.event_name == 'pull_request' && contains(fromJson('["main","master","secure"]'), github.base_ref))
    needs: preflight
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false          # run all matrix legs even if one fails
      matrix:
        include:
          # ---------------------------------------------------------------
          # Linux — GCC
          # ---------------------------------------------------------------
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            cmake_generator: Ninja
            build_type: Debug

          # Linux — Clang
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug

          # ---------------------------------------------------------------
          # macOS — Apple Clang (Xcode toolchain)
          # ---------------------------------------------------------------
          - os: macos-latest
            compiler: apple-clang
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug

          # ---------------------------------------------------------------
          # Windows — MSVC
          # ---------------------------------------------------------------
          - os: windows-latest
            compiler: msvc
            cmake_generator: Ninja
            build_type: Debug

          # Windows — Clang-cl (LLVM toolchain on Windows)
          - os: windows-latest
            compiler: clang-cl
            cmake_generator: Ninja
            build_type: Debug
            env:
              CC: clang-cl
              CXX: clang-cl

          # ---------------------------------------------------------------
          # RelWithDebInfo legs (optimised + debug symbols)
          # ---------------------------------------------------------------
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            cmake_generator: Ninja
            build_type: RelWithDebInfo

          - os: macos-latest
            compiler: apple-clang
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: RelWithDebInfo

          - os: windows-latest
            compiler: msvc
            cmake_generator: Ninja
            build_type: RelWithDebInfo

          # ---------------------------------------------------------------
          # TLS integration legs (exercise AISOCKS_ENABLE_TLS=ON tests)
          # ---------------------------------------------------------------
          - os: ubuntu-latest
            compiler: gcc (tls)
            cc: gcc
            cxx: g++
            cmake_generator: Ninja
            build_type: RelWithDebInfo
            enable_tls: "ON"
            ctest_timeout: 120

          - os: macos-latest
            compiler: apple-clang (tls)
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: RelWithDebInfo
            enable_tls: "ON"
            ctest_timeout: 120

          - os: windows-latest
            compiler: msvc (tls)
            cmake_generator: Ninja
            build_type: RelWithDebInfo
            enable_tls: "ON"
            ctest_timeout: 120

          # ---------------------------------------------------------------
          # Sanitizer legs — Linux/Clang, Debug
          # ASan and UBSan are incompatible with TSan; keep them separate.
          # ---------------------------------------------------------------

          # ASan + UBSan
          - os: ubuntu-latest
            compiler: clang (asan+ubsan)
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer"
            asan_options: "detect_leaks=1:strict_string_checks=1:detect_stack_use_after_return=1"
            ubsan_options: "print_stacktrace=1:halt_on_error=1"
            ctest_timeout: 120

          # TSan
          - os: ubuntu-latest
            compiler: clang (tsan)
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug
            sanitizer_flags: "-fsanitize=thread -fno-omit-frame-pointer"
            tsan_options: "halt_on_error=1:second_deadlock_stack=1"
            ctest_timeout: 180

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout                                                         #
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Install system dependencies                                      #
      # ------------------------------------------------------------------ #
      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Install OpenSSL development package (Linux TLS)
        if: runner.os == 'Linux' && matrix.enable_tls == 'ON'
        run: sudo apt-get install -y libssl-dev

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install OpenSSL (macOS TLS)
        if: runner.os == 'macOS' && matrix.enable_tls == 'ON'
        run: brew install openssl@3

      - name: Install Ninja + LLVM (Windows / clang-cl)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'clang-cl'
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: install ninja llvm -y

      - name: Install Ninja (Windows / MSVC)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'msvc'
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: install ninja -y

      - name: Install OpenSSL (Windows TLS)
        if: runner.os == 'Windows' && matrix.enable_tls == 'ON'
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: install openssl -y

      # Set up MSVC compiler environment (cl.exe, link.exe in PATH)
      - name: Set up MSVC environment
        if: matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ------------------------------------------------------------------ #
      # 3. Configure CMake                                                  #
      # ------------------------------------------------------------------ #
      - name: Configure
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          SANITIZER_FLAGS: ${{ matrix.sanitizer_flags }}
          ENABLE_TLS: ${{ matrix.enable_tls }}
        run: |
          CMAKE_ARGS=(
            -S . -B build
            -G "${{ matrix.cmake_generator }}"
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
            -DBUILD_TESTS=ON
            -DBUILD_EXAMPLES=OFF
          )
          if [[ "$ENABLE_TLS" == "ON" ]]; then
            CMAKE_ARGS+=(
              -DAISOCKS_ENABLE_TLS=ON
            )
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              OPENSSL_PREFIX="$(brew --prefix openssl@3)"
              CMAKE_ARGS+=(
                "-DOPENSSL_ROOT_DIR=$OPENSSL_PREFIX"
              )
            elif [[ "$RUNNER_OS" == "Windows" ]]; then
              OPENSSL_ROOT_DIR_WIN="/c/Program Files/OpenSSL-Win64"
              if [[ ! -d "$OPENSSL_ROOT_DIR_WIN" ]]; then
                OPENSSL_ROOT_DIR_WIN="/c/Program Files/OpenSSL"
              fi
              CMAKE_ARGS+=(
                "-DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR_WIN"
              )
            fi
          fi
          if [[ -n "$SANITIZER_FLAGS" ]]; then
            CMAKE_ARGS+=(
              "-DCMAKE_C_FLAGS=$SANITIZER_FLAGS"
              "-DCMAKE_CXX_FLAGS=$SANITIZER_FLAGS"
              "-DCMAKE_EXE_LINKER_FLAGS=$SANITIZER_FLAGS"
            )
          fi
          cmake "${CMAKE_ARGS[@]}"

      # ------------------------------------------------------------------ #
      # 4. Build                                                            #
      # ------------------------------------------------------------------ #
      # We build only the library + tests; the run_all_tests
      # custom target is skipped here—CTest is called explicitly below so
      # that GitHub Actions can parse the results properly.
      - name: Build
        shell: bash
        run: |
          cmake --build build \
            --parallel $(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)

      # ------------------------------------------------------------------ #
      # 5. Test                                                             #
      # ------------------------------------------------------------------ #
      - name: Run tests
        shell: bash
        working-directory: build
        env:
          ASAN_OPTIONS: ${{ matrix.asan_options }}
          UBSAN_OPTIONS: ${{ matrix.ubsan_options }}
          TSAN_OPTIONS: ${{ matrix.tsan_options }}
          ENABLE_TLS: ${{ matrix.enable_tls }}
        run: |
          if [[ "$RUNNER_OS" == "Windows" && "$ENABLE_TLS" == "ON" ]]; then
            OPENSSL_BIN="/c/Program Files/OpenSSL-Win64/bin"
            if [[ ! -d "$OPENSSL_BIN" ]]; then
              OPENSSL_BIN="/c/Program Files/OpenSSL/bin"
            fi
            export PATH="$OPENSSL_BIN:$PATH"
          fi
          ctest --output-on-failure \
                --no-compress-output \
                --timeout ${{ matrix.ctest_timeout || 60 }} \
                --parallel 4

      # ------------------------------------------------------------------ #
      # 6. Upload test results on failure                                   #
      # ------------------------------------------------------------------ #
      - name: Upload CTest XML results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-results-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: build/Testing/
          retention-days: 7
