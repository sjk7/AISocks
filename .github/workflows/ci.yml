name: CI

on:
  push:
    branches: ["main", "master", "secure"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "html/**"
      - ".gitignore"
      - "LICENSE*"
  pull_request:
    branches: ["main", "master", "secure"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "html/**"
      - ".gitignore"
      - "LICENSE*"
  workflow_dispatch:

jobs:
  preflight:
    name: Preflight / Event Diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "sha=${{ github.sha }}"

  build-and-test:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(fromJson('["refs/heads/main","refs/heads/master","refs/heads/secure"]'), github.ref)) ||
      (github.event_name == 'pull_request' && contains(fromJson('["main","master","secure"]'), github.base_ref))
    needs: preflight
    name: Build and Test
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_CACHE_SIZE: "2G"

    strategy:
      fail-fast: false          # run all matrix legs even if one fails
      matrix:
        include:
          # ---------------------------------------------------------------
          # Linux — GCC
          # ---------------------------------------------------------------
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            cmake_generator: Ninja
            build_type: Debug
            enable_tls: "OFF"
            tier: fast

          # Linux — Clang
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug
            enable_tls: "OFF"
            tier: fast

          # ---------------------------------------------------------------
          # macOS — Apple Clang (Xcode toolchain)
          # ---------------------------------------------------------------
          - os: macos-latest
            compiler: apple-clang
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug
            enable_tls: "OFF"
            tier: fast

          # ---------------------------------------------------------------
          # Windows — MSVC
          # ---------------------------------------------------------------
          - os: windows-latest
            compiler: msvc
            cmake_generator: Ninja
            build_type: Debug
            enable_tls: "OFF"
            tier: fast

          # Windows — Clang-cl (LLVM toolchain on Windows)
          - os: windows-latest
            compiler: clang-cl
            cmake_generator: Ninja
            build_type: Debug
            enable_tls: "OFF"
            tier: fast
            env:
              CC: clang-cl
              CXX: clang-cl

          # ---------------------------------------------------------------
          # RelWithDebInfo legs (optimised + debug symbols)
          # ---------------------------------------------------------------
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            cmake_generator: Ninja
            build_type: RelWithDebInfo
            enable_tls: "OFF"
            tier: full

          - os: macos-latest
            compiler: apple-clang
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: RelWithDebInfo
            enable_tls: "OFF"
            tier: full

          - os: windows-latest
            compiler: msvc
            cmake_generator: Ninja
            build_type: RelWithDebInfo
            enable_tls: "OFF"
            tier: full

          # ---------------------------------------------------------------
          # TLS integration legs (exercise AISOCKS_ENABLE_TLS=ON tests)
          # ---------------------------------------------------------------
          - os: ubuntu-latest
            compiler: gcc (tls)
            cc: gcc
            cxx: g++
            cmake_generator: Ninja
            build_type: RelWithDebInfo
            enable_tls: "ON"
            ctest_timeout: 120
            tier: full

          - os: macos-latest
            compiler: apple-clang (tls)
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: RelWithDebInfo
            enable_tls: "ON"
            ctest_timeout: 120
            tier: full

          - os: windows-latest
            compiler: msvc (tls)
            cmake_generator: Ninja
            build_type: RelWithDebInfo
            enable_tls: "ON"
            ctest_timeout: 120
            tier: full

          # ---------------------------------------------------------------
          # Sanitizer legs — Linux/Clang, Debug
          # ASan and UBSan are incompatible with TSan; keep them separate.
          # ---------------------------------------------------------------

          # ASan + UBSan
          - os: ubuntu-latest
            compiler: clang (asan+ubsan)
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug
            enable_tls: "OFF"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer"
            asan_options: "detect_leaks=1:strict_string_checks=1:detect_stack_use_after_return=1"
            ubsan_options: "print_stacktrace=1:halt_on_error=1"
            ctest_timeout: 120
            tier: full

          # TSan
          - os: ubuntu-latest
            compiler: clang (tsan)
            cc: clang
            cxx: clang++
            cmake_generator: Ninja
            build_type: Debug
            enable_tls: "OFF"
            sanitizer_flags: "-fsanitize=thread -fno-omit-frame-pointer"
            tsan_options: "halt_on_error=1:second_deadlock_stack=1"
            ctest_timeout: 180
            tier: full

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout                                                         #
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v5

      # ------------------------------------------------------------------ #
      # 2. Install system dependencies                                      #
      # ------------------------------------------------------------------ #
      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          if command -v ninja >/dev/null 2>&1; then
            echo "ninja already present"
          else
            sudo apt-get update
            sudo apt-get install -y ninja-build
          fi

      - name: Install OpenSSL development package (Linux TLS)
        if: runner.os == 'Linux' && matrix.enable_tls == 'ON'
        run: sudo apt-get install -y libssl-dev

      - name: Install sccache (Linux)
        if: runner.os == 'Linux'
        run: |
          if command -v sccache >/dev/null 2>&1; then
            echo "sccache already present"
          else
            sudo apt-get update
            sudo apt-get install -y sccache
          fi

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: |
          if command -v ninja >/dev/null 2>&1; then
            echo "ninja already present"
          else
            brew install ninja
          fi

      - name: Install OpenSSL (macOS TLS)
        if: runner.os == 'macOS' && matrix.enable_tls == 'ON'
        run: brew install openssl@3

      - name: Install sccache (macOS)
        if: runner.os == 'macOS'
        run: |
          if command -v sccache >/dev/null 2>&1; then
            echo "sccache already present"
          else
            brew install sccache
          fi

      - name: Install Ninja + LLVM (Windows / clang-cl)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'clang-cl'
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          } else {
            Write-Host "ninja already present"
          }
          if (-not (Get-Command clang-cl -ErrorAction SilentlyContinue)) {
            choco install llvm -y
          } else {
            Write-Host "clang-cl already present"
          }

      - name: Install Ninja (Windows / MSVC)
        if: matrix.os == 'windows-latest' && startsWith(matrix.compiler, 'msvc')
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          } else {
            Write-Host "ninja already present"
          }

      - name: Install sccache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command sccache -ErrorAction SilentlyContinue)) {
            choco install sccache -y
          } else {
            Write-Host "sccache already present"
          }

      - name: Install OpenSSL (Windows TLS)
        if: runner.os == 'Windows' && matrix.enable_tls == 'ON'
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: install openssl -y

      # Set up MSVC compiler environment (cl.exe, link.exe in PATH)
      - name: Set up MSVC environment
        if: startsWith(matrix.compiler, 'msvc')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ------------------------------------------------------------------ #
      # 3. Configure CMake                                                  #
      # ------------------------------------------------------------------ #
      - name: Configure
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          SANITIZER_FLAGS: ${{ matrix.sanitizer_flags }}
          ENABLE_TLS: ${{ matrix.enable_tls }}
        run: |
          if [[ "$ENABLE_TLS" != "ON" && "$ENABLE_TLS" != "OFF" ]]; then
            echo "Invalid matrix.enable_tls='$ENABLE_TLS' (expected ON or OFF)" >&2
            exit 1
          fi
          CMAKE_ARGS=(
            -S . -B build
            -G "${{ matrix.cmake_generator }}"
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
            -DBUILD_TESTS=ON
            -DBUILD_EXAMPLES=OFF
            -DAISOCKS_ENABLE_TLS=${ENABLE_TLS}
          )
          if command -v sccache >/dev/null 2>&1; then
            echo "[ci] enabling sccache compiler launcher"
            sccache --zero-stats || true
            CMAKE_ARGS+=(
              "-DCMAKE_C_COMPILER_LAUNCHER=sccache"
              "-DCMAKE_CXX_COMPILER_LAUNCHER=sccache"
            )
          fi
          if [[ "$RUNNER_OS" == "Windows" && "${{ matrix.build_type }}" == "RelWithDebInfo" ]]; then
            # Use CMake's MSVC debug-info knob to request /Z7 without passing
            # raw /-style flags through Git Bash argument conversion.
            CMAKE_ARGS+=(
              "-DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded"
            )
          fi
          if [[ "$ENABLE_TLS" == "ON" ]]; then
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              OPENSSL_PREFIX="$(brew --prefix openssl@3)"
              CMAKE_ARGS+=(
                "-DOPENSSL_ROOT_DIR=$OPENSSL_PREFIX"
              )
            elif [[ "$RUNNER_OS" == "Windows" ]]; then
              OPENSSL_ROOT_DIR_WIN="/c/Program Files/OpenSSL-Win64"
              if [[ ! -d "$OPENSSL_ROOT_DIR_WIN" ]]; then
                OPENSSL_ROOT_DIR_WIN="/c/Program Files/OpenSSL"
              fi

              # Chocolatey OpenSSL layouts vary across versions; pass explicit
              # import library paths so FindOpenSSL can always resolve Crypto.
              OPENSSL_SSL_LIBRARY_WIN=""
              OPENSSL_CRYPTO_LIBRARY_WIN=""

              for _cand in \
                "$OPENSSL_ROOT_DIR_WIN/lib/libssl.lib" \
                "$OPENSSL_ROOT_DIR_WIN/lib/VC/x64/MD/libssl.lib" \
                "$OPENSSL_ROOT_DIR_WIN/lib/VC/static/libssl.lib" \
                "$OPENSSL_ROOT_DIR_WIN/lib/ssl.lib" \
                "$OPENSSL_ROOT_DIR_WIN/lib/VC/x64/MD/ssl.lib" \
                "$OPENSSL_ROOT_DIR_WIN/lib/VC/static/ssl.lib"; do
                if [[ -f "$_cand" ]]; then
                  OPENSSL_SSL_LIBRARY_WIN="$_cand"
                  break
                fi
              done

              for _cand in \
                "$OPENSSL_ROOT_DIR_WIN/lib/libcrypto.lib" \
                "$OPENSSL_ROOT_DIR_WIN/lib/VC/x64/MD/libcrypto.lib" \
                "$OPENSSL_ROOT_DIR_WIN/lib/VC/static/libcrypto.lib" \
                "$OPENSSL_ROOT_DIR_WIN/lib/crypto.lib" \
                "$OPENSSL_ROOT_DIR_WIN/lib/VC/x64/MD/crypto.lib" \
                "$OPENSSL_ROOT_DIR_WIN/lib/VC/static/crypto.lib"; do
                if [[ -f "$_cand" ]]; then
                  OPENSSL_CRYPTO_LIBRARY_WIN="$_cand"
                  break
                fi
              done

              if [[ -z "$OPENSSL_SSL_LIBRARY_WIN" || -z "$OPENSSL_CRYPTO_LIBRARY_WIN" ]]; then
                echo "Failed to resolve OpenSSL libraries under: $OPENSSL_ROOT_DIR_WIN" >&2
                find "$OPENSSL_ROOT_DIR_WIN" -maxdepth 5 -type f \( -iname "*ssl*.lib" -o -iname "*crypto*.lib" \) -print || true
                exit 1
              fi

              CMAKE_ARGS+=(
                "-DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR_WIN"
                "-DOPENSSL_SSL_LIBRARY=$OPENSSL_SSL_LIBRARY_WIN"
                "-DOPENSSL_CRYPTO_LIBRARY=$OPENSSL_CRYPTO_LIBRARY_WIN"
              )
            fi
          fi
          if [[ -n "$SANITIZER_FLAGS" ]]; then
            CMAKE_ARGS+=(
              "-DCMAKE_C_FLAGS=$SANITIZER_FLAGS"
              "-DCMAKE_CXX_FLAGS=$SANITIZER_FLAGS"
              "-DCMAKE_EXE_LINKER_FLAGS=$SANITIZER_FLAGS"
            )
          fi
          cmake "${CMAKE_ARGS[@]}"

      # ------------------------------------------------------------------ #
      # 4. Build                                                            #
      # ------------------------------------------------------------------ #
      # We build only the library + tests; the run_all_tests
      # custom target is skipped here—CTest is called explicitly below so
      # that GitHub Actions can parse the results properly.
      - name: Build
        shell: bash
        if: github.event_name != 'pull_request' || matrix.tier == 'fast'
        run: |
          if [[ "$RUNNER_OS" == "Windows" && -n "${NUMBER_OF_PROCESSORS:-}" ]]; then
            BUILD_JOBS="$NUMBER_OF_PROCESSORS"
          else
            BUILD_JOBS="$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)"
          fi
          echo "[ci] build parallel jobs=$BUILD_JOBS"
          cmake --build build \
            --parallel "$BUILD_JOBS"
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

      # ------------------------------------------------------------------ #
      # 5. Test                                                             #
      # ------------------------------------------------------------------ #
      - name: Run tests
        shell: bash
        if: github.event_name != 'pull_request' || matrix.tier == 'fast'
        working-directory: build
        env:
          ASAN_OPTIONS: ${{ matrix.asan_options }}
          UBSAN_OPTIONS: ${{ matrix.ubsan_options }}
          TSAN_OPTIONS: ${{ matrix.tsan_options }}
          ENABLE_TLS: ${{ matrix.enable_tls }}
        run: |
          if [[ "$RUNNER_OS" == "Windows" && "$ENABLE_TLS" == "ON" ]]; then
            export AISOCKS_TLS_DEBUG=1
            OPENSSL_BIN="/c/Program Files/OpenSSL-Win64/bin"
            if [[ ! -d "$OPENSSL_BIN" ]]; then
              OPENSSL_BIN="/c/Program Files/OpenSSL/bin"
            fi
            echo "[ci-debug] OPENSSL_BIN=$OPENSSL_BIN"
            if [[ -d "$OPENSSL_BIN" ]]; then
              echo "[ci-debug] OpenSSL bin contents:"
              ls -la "$OPENSSL_BIN" || true
            fi
            export PATH="$OPENSSL_BIN:$PATH"

            echo "[ci-debug] Running focused verbose TLS test"
            ctest -V -R test_tls_client --output-on-failure --timeout ${{ matrix.ctest_timeout || 60 }}
          fi

          if [[ "$RUNNER_OS" == "Windows" && -n "${NUMBER_OF_PROCESSORS:-}" ]]; then
            CTEST_PARALLEL="$NUMBER_OF_PROCESSORS"
            if [[ "$CTEST_PARALLEL" -gt 10 ]]; then
              CTEST_PARALLEL=10
            fi
          else
            CTEST_PARALLEL=4
          fi
          echo "[ci] ctest parallel jobs=$CTEST_PARALLEL"
          ctest --output-on-failure \
                --no-compress-output \
                --timeout ${{ matrix.ctest_timeout || 60 }} \
                --parallel "$CTEST_PARALLEL"

      # ------------------------------------------------------------------ #
      # 6. Upload test results on failure                                   #
      # ------------------------------------------------------------------ #
      - name: Upload CTest XML results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-results-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: build/Testing/
          retention-days: 7
