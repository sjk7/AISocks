<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      padding: 40px 50px;
      max-width: 480px;
      text-align: center;
    }
    h1 { color: #2c3e50; margin-top: 0; }
    p  { color: #555; line-height: 1.6; }
    .badge {
      display: inline-block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.85em;
      margin-bottom: 20px;
    }
    a.btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
    }
    a.btn:hover { background: #5a6fd6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">&#x1F513; No login required</div>
    <h1>&#x1F44B; Welcome</h1>
    <p>This is a public page served by <strong>advanced_file_server</strong>.</p>
    <p>It is accessible without any authentication and is a good place to put
       status information, a login prompt, or a landing page.</p>
    <a class="btn" href="/">&#x1F512; Sign in to continue</a>
  </div>
</body>
</html>
