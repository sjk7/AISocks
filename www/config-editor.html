<!DOCTYPE html>
<html>

<head>
    <title>Config Editor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 300;
        }

        .header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin: 20px 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="number"]:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4facfe;
        }

        .form-group .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .form-group .checkbox-label {
            margin: 0;
            font-weight: normal;
        }

        .section {
            margin: 30px 0;
            padding: 20px;
            border-left: 4px solid #4facfe;
            background: #f8f9fa;
            border-radius: 0 8px 8px 0;
        }

        .section h2 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .col {
            flex: 1;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .footer {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        a {
            color: #2980b9;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Config Editor</h1>
            <p>Edit server configuration (local access only)</p>
        </div>

        <div class="content">
            <div class="section">
                <h2>🌐 Server Settings</h2>
                <div class="form-group">
                    <label for="bindAddress">Bind Address</label>
                    <select id="bindAddress">
                        <option value="">Loading IPs...</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col">
                        <div class="form-group">
                            <label for="httpPort">HTTP Port</label>
                            <input type="number" id="httpPort" min="1" max="65535">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="wwwRoot">Document Root</label>
                    <input type="text" id="wwwRoot">
                </div>
            </div>

            <div class="section">
                <h2>🔒 TLS Settings</h2>
                <div class="row">
                    <div class="col">
                        <div class="form-group">
                            <label for="cert">Certificate File</label>
                            <input type="text" id="cert">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group">
                            <label for="key">Key File</label>
                            <input type="text" id="key">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="enableHttps">
                        <label for="enableHttps" class="checkbox-label">Enable HTTPS</label>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>📝 Logging Settings</h2>
                <div class="form-group">
                    <label for="logPath">Log Path</label>
                    <input type="text" id="logPath">
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="enableLogging">
                        <label for="enableLogging" class="checkbox-label">Enable Logging</label>
                    </div>
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="enableLogRotation">
                        <label for="enableLogRotation" class="checkbox-label">Enable Log Rotation</label>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <div class="form-group">
                            <label for="logMaxSizeBytes">Max Log Size (bytes)</label>
                            <input type="number" id="logMaxSizeBytes" min="0">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group">
                            <label for="logMaxFiles">Max Log Files</label>
                            <input type="number" id="logMaxFiles" min="1">
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>🎨 Display Settings</h2>
                <div class="form-group">
                    <label for="indexFile">Index File</label>
                    <input type="text" id="indexFile">
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="directoryListing">
                        <label for="directoryListing" class="checkbox-label">Enable Directory Listing</label>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-secondary" onclick="loadConfig()">Reload Config</button>
                <button class="btn-primary" onclick="saveConfig()">Save & Restart Server</button>
            </div>

            <div id="status" class="status"></div>
        </div>

        <div class="footer">
            <p><a href="/testing-guide.html">&larr; Back to Testing Guide</a></p>
        </div>
    </div>

    <script src="config-editor.js"></script>
</body>

</html>
